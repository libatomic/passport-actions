$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.signup.sms
version: "1.0.0"
title: user.signup.sms
description: >
  SMS signup verification. Sent through the PrincipalNotify path with
  signup=true.

type: object
required:
  - code
  - link
  - member
  - instance
properties:
  code:
    type: string
    description: OTP verification code
  link:
    type: string
    format: uri
    description: Verification URL with embedded access token
  token:
    type: string
    description: Access token for verification
  member:
    $ref: libatomic/passport-actions/schemas/oauth/openid/profile@v1.0.0
  instance:
    $ref: libatomic/passport-actions/schemas/atomic/instance@v1.0.0
  template_options:
    type: object
    description: Template rendering options (admin users only)
    properties:
      skip_sender_verification:
        type: boolean
