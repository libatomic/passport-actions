$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.password.email
version: "1.0.0"
title: user.password.email
description: >
  Passwordless email login. Contains the OTP code, session link, and
  requesting client context.

type: object
required:
  - code
  - link
  - member
  - instance
properties:
  code:
    type: string
    description: OTP login code
  link:
    type: string
    format: uri
    description: Session link URL
  token:
    type: string
    description: Access token
  member:
    type: object
    description: User's OpenID profile
    properties:
      name:
        type: string
      email:
        type: string
        format: email
      given_name:
        type: string
      family_name:
        type: string
      picture:
        type: string
        format: uri
      phone_number:
        type: string
  instance:
    type: object
    description: Instance context
    properties:
      name:
        type: string
      uuid:
        type: string
        format: uuid
  client_id:
    type: string
    description: OAuth client ID that initiated the request
  client_display_name:
    type: string
    description: Display name of the requesting client
  client_name:
    type: string
    description: Username of the requesting client
  mfa:
    type: boolean
    description: Whether this is an MFA challenge
  template_options:
    type: object
    description: Template rendering options (admin users only, email channel)
    properties:
      skip_sender_verification:
        type: boolean
