$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.updated
version: "1.0.0"
title: user.updated
description: >
  Emitted when a user is updated. Body is the serialized UserUpdateInput
  params plus an event_filter for routing.

type: object
properties:
  instance_id:
    type: string
    format: uuid
  user_id:
    type: string
    format: uuid
  login:
    type: string
  password_expires_at:
    type: string
    format: date-time
  preferences:
    type: object
  profile:
    description: OpenID profile (partial update)
    $ref: libatomic/passport-actions/schemas/oauth/openid/profile@v1.0.0
  roles:
    type: object
    description: Role add/remove operations
  mfa_required:
    type: boolean
  metadata:
    type: object
  event_filter:
    type: string
    description: GJSON path of changed fields for event routing
