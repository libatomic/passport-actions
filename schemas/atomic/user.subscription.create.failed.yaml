$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.subscription.create.failed
version: "1.0.0"
title: user.subscription.create.failed
description: >
  Emitted when a subscription creation fails. Body is the serialized
  SubscriptionCreateInput.

type: object
properties:
  user_id:
    type: string
    format: uuid
  status:
    type: string
  stripe_subscription:
    type: string
  stripe_item:
    type: string
  credit_id:
    type: string
    format: uuid
  begins_at:
    type: string
    format: date-time
  ends_at:
    type: string
    format: date-time
  cancel_at:
    type: string
    format: date-time
  trial_ends_at:
    type: string
    format: date-time
  price_id:
    type: string
    format: uuid
  quantity:
    type: integer
  max_quantity:
    type: integer
  metadata:
    type: object
  auto_renew:
    type: boolean
