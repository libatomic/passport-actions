$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.password.reset.sms
version: "1.0.0"
title: user.password.reset.sms
description: >
  Password reset via SMS. Contains the reset link and requesting client
  context but no OTP code.

type: object
required:
  - link
  - member
  - instance
properties:
  link:
    type: string
    format: uri
    description: Password reset session URL
  token:
    type: string
    description: Access token
  member:
    $ref: libatomic/passport-actions/schemas/oauth/openid/profile@v1.0.0
  instance:
    $ref: libatomic/passport-actions/schemas/atomic/instance@v1.0.0
  client_id:
    type: string
    description: OAuth client ID that initiated the request
  client_display_name:
    type: string
    description: Display name of the requesting client
  client_name:
    type: string
    description: Username of the requesting client
  template_options:
    type: object
    description: Template rendering options (admin users only, email channel)
    properties:
      skip_sender_verification:
        type: boolean
