$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.password.sms
version: "1.0.0"
title: user.password.sms
description: >
  Passwordless SMS login. Contains the OTP code, session link, and
  requesting client context.

type: object
required:
  - code
  - link
  - member
  - instance
properties:
  code:
    type: string
    description: OTP login code
  link:
    type: string
    format: uri
    description: Session link URL
  token:
    type: string
    description: Access token
  member:
    $ref: libatomic/passport-actions/schemas/oauth/openid/profile@v1.0.0
  instance:
    $ref: libatomic/passport-actions/schemas/atomic/instance@v1.0.0
  client_id:
    type: string
    description: OAuth client ID that initiated the request
  client_display_name:
    type: string
    description: Display name of the requesting client
  client_name:
    type: string
    description: Username of the requesting client
  mfa:
    type: boolean
    description: Whether this is an MFA challenge
  template_options:
    type: object
    description: Template rendering options (admin users only, email channel)
    properties:
      skip_sender_verification:
        type: boolean
