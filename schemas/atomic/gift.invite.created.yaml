$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/gift.invite.created
version: "1.0.0"
title: gift.invite.created
description: >
  Emitted when a gift invite is created. Body is the serialized
  CreditInviteCreateInput.

type: object
required:
  - credit_id
properties:
  credit_id:
    type: string
    format: uuid
  owner_id:
    type: string
    format: uuid
  owner_email:
    type: string
    format: email
  passcode:
    type: string
  user_id:
    type: string
    format: uuid
  to:
    type: string
    format: email
    description: Recipient email address
  message:
    type: string
    description: Personal message from the sender
  send_at:
    type: string
    format: date-time
  auto_accept:
    type: boolean
