$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/atomic/user.sms.verify
version: "1.0.0"
title: user.sms.verify
description: >
  SMS verification request. Sent via the oauth verify flow (with code) or
  when a user updates their phone number (without code).

type: object
required:
  - link
  - member
  - instance
properties:
  code:
    type: string
    description: OTP verification code (present when sent via the oauth verify flow)
  link:
    type: string
    format: uri
    description: Verification URL with embedded access token
  token:
    type: string
    description: Access token for verification
  member:
    $ref: libatomic/passport-actions/schemas/oauth/openid/profile@v1.0.0
  instance:
    $ref: libatomic/passport-actions/schemas/atomic/instance@v1.0.0
  template_options:
    type: object
    description: Template rendering options (admin users only)
    properties:
      skip_sender_verification:
        type: boolean
