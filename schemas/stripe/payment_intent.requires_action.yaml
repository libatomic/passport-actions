$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/stripe/payment_intent.requires_action
version: "1.0.0"
title: payment_intent.requires_action
description: >
  Event body schema for Stripe payment_intent.requires_action. The Stripe
  PaymentIntent object requiring customer action.

type: object
properties:
  id:
    type: string
  customer:
    type: string
  amount:
    type: integer
  currency:
    type: string
  status:
    type: string
    const: requires_action
  next_action:
    type: object
    properties:
      type:
        type: string
      redirect_to_url:
        type: object
        properties:
          url:
            type: string
            format: uri
          return_url:
            type: string
            format: uri
  client_secret:
    type: string
  metadata:
    type: object
