$schema: https://json-schema.org/draft/2020-12/schema
$id: libatomic/passport-actions/schemas/stripe/payment_intent.payment_failed
version: "1.0.0"
title: payment_intent.payment_failed
description: >
  Event body schema for Stripe payment_intent.payment_failed. The Stripe
  PaymentIntent object for a failed payment.

type: object
properties:
  id:
    type: string
  customer:
    type: string
  amount:
    type: integer
  currency:
    type: string
  status:
    type: string
  payment_method:
    type: string
  last_payment_error:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
      type:
        type: string
      decline_code:
        type: string
  metadata:
    type: object
