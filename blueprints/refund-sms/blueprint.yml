name: Refund SMS
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/cash-refund.svg
description: |
  Texts a customer when a charge is refunded. Fires on the Stripe charge.refunded
  webhook event and sends the refund confirmation SMS template to the associated user.
category: billing
replaces:
  event_type: charge.refunded
  channel: sms
inputs:
  template:
    description: The refund confirmation SMS template
    default: refund-sms
definition:
  name: Refund SMS
  description: Texts a customer when a Stripe charge is refunded.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/cash-refund.svg
  version: 1

  on:
    - event:
        name: charge.refunded
        schema:
          ref: libatomic/passport-actions/schemas/stripe/charge.refunded@v1.0.0
      source: stripe

  steps:
    - id: send-refund
      action: sendsms
      with:
        user_id: ${{ trigger.user_id }}
        template: ${{ inputs.template }}
        data:
          charge: ${{ trigger.body }}
