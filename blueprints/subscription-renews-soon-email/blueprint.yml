name: Subscription Renews Soon Email
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/calendar-refresh-outline.svg
description: |
  Reminds a subscriber that their subscription renews soon. Fires on the Stripe
  invoice.upcoming webhook event, loads the associated user, and sends the upcoming-
  renewal template with the next billing details.
category: billing
replaces:
  event_type: invoice.upcoming
  channel: email
inputs:
  template:
    description: The upcoming-renewal email template
    default: subscription-renews-soon-email
definition:
  name: Subscription Renews Soon Email
  description: Reminds a subscriber before their Stripe subscription renews.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/calendar-refresh-outline.svg
  version: 1

  on:
    - event:
        name: invoice.upcoming
        schema:
          ref: libatomic/passport-actions/schemas/stripe/invoice.upcoming@v1.0.0
      source: stripe

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-reminder
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          invoice: ${{ trigger.body }}
