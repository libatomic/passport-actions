name: Subscription Canceled
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
description: |
  Sends a notification email when a user's subscription is canceled. Confirms the cancellation and may include information about what access the user retains.
category: billing
replaces:
  event_type: user.entitlement.canceled
  channel: email
inputs:
  template:
    description: The cancellation email template
    default: subscription-canceled
definition:
  name: Subscription Canceled
  description: Sends a notification email when a user's subscription is canceled. Confirms the cancellation and may include information about what access the user retains.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
  version: 1

  on:
    - event:
        name: user.entitlement.canceled
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.entitlement.canceled@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-cancellation
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          entitlement: ${{ trigger.body }}
