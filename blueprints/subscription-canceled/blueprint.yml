name: Subscription Canceled
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
description: |
  Sends a notification email when a user's subscription transitions to canceled. Resolves the subscriber via the subscription ID on the event. Subscription events are related to but distinct from entitlement events.
category: billing
replaces:
  event_type: user.subscription.status.canceled
  channel: email
inputs:
  template:
    description: The cancellation email template
    default: subscription-canceled
definition:
  name: Subscription Canceled
  description: Sends a notification email when a user's subscription is canceled.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
  version: 1

  on:
    - event:
        name: user.subscription.status.canceled
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.subscription.status.canceled@v1.0.0

  steps:
    - id: load-subscription
      action: subscription.get
      with:
        subscription_id: ${{ trigger.body.subscription }}

    - id: load-user
      action: user.get
      with:
        user_id: ${{ steps.load-subscription.outputs.subscription.user_id }}

    - id: send-cancellation
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          subscription: ${{ steps.load-subscription.outputs.subscription }}
