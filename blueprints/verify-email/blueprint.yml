name: Email Verification
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/shield-check-outline.svg
description: |
  Sends a verification code or magic link to the user's email address when they sign up or request email verification. The workflow loads the user profile and renders the configured email template with the verification code and link.
category: authentication
replaces:
  event_type: user.email.verify
  channel: email
inputs:
  template:
    description: The verification email template
    default: verify-email
definition:
  name: Email Verification
  description: Sends a verification code or magic link to the user's email address when they sign up or request email verification. The workflow loads the user profile and renders the configured email template with the verification code and link.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/shield-check-outline.svg
  version: 1

  on:
    - event:
        name: user.email.verify
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.email.verify@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-verification
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
