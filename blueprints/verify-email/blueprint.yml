name: verify-email
description: |
  Send an email verification code/link when a user signs up or requests verification.
  Replaces the template trigger for event: user.email.verify
category: authentication
replaces:
  event_type: user.email.verify
  channel: email
inputs:
  template:
    description: The verification email template
    default: verify-email
definition:
  name: verify-email
  version: 1

  on:
    - event: user.email.verify

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-verification
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
