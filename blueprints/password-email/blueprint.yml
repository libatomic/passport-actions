name: password-email
description: |
  Send a one-time password or magic link via email for passwordless login.
  Replaces the template trigger for event: user.password.email
category: authentication
replaces:
  event_type: user.password.email
  channel: email
inputs:
  template:
    description: The passwordless login email template
    default: password-email
definition:
  name: password-email
  version: 1

  on:
    - event: user.password.email

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-password
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
