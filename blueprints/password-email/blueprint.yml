name: Passwordless Login (Email)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/email-lock-outline.svg
description: |
  Sends a one-time password or magic link via email for passwordless authentication. Triggered when a user requests passwordless login, this workflow loads their profile and delivers the login credentials to their email.
category: authentication
replaces:
  event_type: user.password.email
  channel: email
inputs:
  template:
    description: The passwordless login email template
    default: password-email
definition:
  name: Passwordless Login (Email)
  description: Sends a one-time password or magic link via email for passwordless authentication. Triggered when a user requests passwordless login, this workflow loads their profile and delivers the login credentials to their email.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/email-lock-outline.svg
  version: 1

  on:
    - event: user.password.email

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-password
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
