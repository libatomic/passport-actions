name: signup-email
description: |
  Send a signup confirmation or verification email when a new user registers via email.
  Replaces the template trigger for event: user.signup.email
category: onboarding
replaces:
  event_type: user.signup.email
  channel: email
inputs:
  template:
    description: The signup email template
    default: signup
definition:
  name: signup-email
  version: 1

  on:
    - event: user.signup.email

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-signup
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
