name: Signup Confirmation (Email)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-plus-outline.svg
description: |
  Sends a signup confirmation or verification email when a new user registers. Welcomes the user and provides a verification code or link to confirm their email address.
category: onboarding
replaces:
  event_type: user.signup.email
  channel: email
inputs:
  template:
    description: The signup email template
    default: signup
definition:
  name: Signup Confirmation (Email)
  description: Sends a signup confirmation or verification email when a new user registers. Welcomes the user and provides a verification code or link to confirm their email address.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-plus-outline.svg
  version: 1

  on:
    - event:
        name: user.signup.email
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.signup.email@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-signup
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
