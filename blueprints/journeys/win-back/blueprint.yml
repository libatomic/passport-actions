name: Win-Back
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/heart-broken-outline.svg
description: |
  Re-engage churned subscribers. Fires when a subscription is canceled, waits a few days
  (so it doesn't feel automated), then sends a win-back offer. The canceled event carries
  only the subscription id, so the subscriber is resolved via subscription.get.
category: lifecycle
replaces:
  event_type: user.subscription.status.canceled
  channel: email
inputs:
  wait_duration:
    description: How long to wait after cancellation before the win-back email
    type: string
    default: 3d
  winback_template:
    description: Template for the win-back offer
    type: string
    default: win-back
definition:
  name: Win-Back
  description: Waits a few days after cancellation, then emails a win-back offer.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/heart-broken-outline.svg
  version: 1

  on:
    - event:
        name: user.subscription.status.canceled
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.subscription.status.canceled@v1.0.0

  steps:
    - id: load-subscription
      action: subscription.get
      with:
        subscription_id: ${{ trigger.body.subscription_id }}

    - id: load-user
      action: user.get
      with:
        user_id: ${{ steps.load-subscription.outputs.subscription.user_id }}

    - id: wait
      action: wait
      with:
        duration: ${{ inputs.wait_duration }}

    - id: winback
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.winback_template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          subscription: ${{ steps.load-subscription.outputs.subscription }}
