name: Welcome Podcast Episode
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/podcast.svg
description: |
  Publishes a personal welcome episode into a new subscriber's podcast feed when their
  subscription becomes active. Renders a template for the item notes and attaches an
  uploaded audio file as the podcast enclosure.
category: content
replaces:
  event_type: user.subscription.status.active
  channel: podcast
inputs:
  template:
    description: Template rendered for the episode notes/description
    type: string
    default: welcome-subscription-podcast
  episode_asset:
    description: Audio asset id (mp3/mp4) to attach as the podcast enclosure. Pick it on the "Create Feed Item" step's audio selector.
    type: string
    default: ''
definition:
  name: Welcome Podcast Episode
  description: Adds a welcome episode to a new subscriber's podcast feed.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/podcast.svg
  version: 1

  on:
    - event:
        name: user.subscription.status.active
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.subscription.status.active@v1.0.0

  steps:
    - id: render
      action: template.render
      with:
        template_name: ${{ inputs.template }}
        data:
          subscription: ${{ trigger.body }}

    - id: publish
      action: feed.item.create
      with:
        channel: podcast
        user_id: ${{ trigger.user_id }}
        title: Welcome
        content: ${{ steps.render.outputs.body }}
        enclosure_asset_id: ${{ inputs.episode_asset }}
