name: Password Reset (Email)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/lock-reset.svg
description: |
  Sends a password reset link or code via email when a user requests to change their password. Loads the user profile and renders the reset email template with the reset code and link.
category: authentication
replaces:
  event_type: user.password.reset.email
  channel: email
inputs:
  template:
    description: The password reset email template
    default: password-reset
definition:
  name: Password Reset (Email)
  description: Sends a password reset link or code via email when a user requests to change their password. Loads the user profile and renders the reset email template with the reset code and link.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/lock-reset.svg
  version: 1

  on:
    - event: user.password.reset.email

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-reset
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          code: ${{ trigger.body.code }}
          link: ${{ trigger.body.link }}
