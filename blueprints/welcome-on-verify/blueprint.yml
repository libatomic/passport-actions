name: Welcome Email
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/hand-wave-outline.svg
description: |
  Sends a welcome email after a user successfully verifies their email address. This is typically the first branded communication a new user receives after completing registration.
category: onboarding
replaces:
  event_type: user.email.verified
  channel: email
inputs:
  template:
    description: The email template to render
    default: welcome
definition:
  name: Welcome Email
  description: Sends a welcome email after a user successfully verifies their email address. This is typically the first branded communication a new user receives after completing registration.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/hand-wave-outline.svg
  version: 1

  on:
    - event:
        name: user.email.verified
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.email.verified@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-welcome
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
