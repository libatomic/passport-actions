name: signup-sms
description: |
  Send a signup verification code via SMS when a new user registers with a phone number.
  Replaces the template trigger for event: user.signup.sms
category: onboarding
replaces:
  event_type: user.signup.sms
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: signup-sms
definition:
  name: signup-sms
  version: 1

  on:
    - event: user.signup.sms

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
