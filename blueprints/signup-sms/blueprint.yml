name: Signup Confirmation (SMS)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-plus-outline.svg
description: |
  Sends a signup verification code via SMS when a new user registers. Delivers a verification code to the user's phone number to confirm their account.
category: onboarding
replaces:
  event_type: user.signup.sms
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: signup-sms
definition:
  name: Signup Confirmation (SMS)
  description: Sends a signup verification code via SMS when a new user registers. Delivers a verification code to the user's phone number to confirm their account.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-plus-outline.svg
  version: 1

  on:
    - event:
        name: user.signup.sms
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.signup.sms@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
