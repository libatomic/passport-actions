name: Gift Invitation
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/gift-outline.svg
description: |
  Sends a gift invitation email to the recipient when a user purchases a gift. Loads the sender's profile and delivers the invitation with gift details to the recipient's email address.
category: engagement
replaces:
  event_type: gift.invite.created
  channel: email
inputs:
  template:
    description: The gift invite email template
    default: gift-invite
definition:
  name: Gift Invitation
  description: Sends a gift invitation email to the recipient when a user purchases a gift. Loads the sender's profile and delivers the invitation with gift details to the recipient's email address.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/gift-outline.svg
  version: 1

  on:
    - event:
        name: gift.invite.created
        schema:
          ref: libatomic/passport-actions/schemas/atomic/gift.invite.created@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-invite
      action: sendmail
      with:
        to: ${{ trigger.body.recipient_email }}
        template: ${{ inputs.template }}
        data:
          sender: ${{ steps.load-user.outputs.user }}
          gift: ${{ trigger.body }}
