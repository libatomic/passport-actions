name: Subscription Canceled (Campaign Monitor)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-cancel-outline.svg
description: |
  Removes a user from a Campaign Monitor list (e.g. your paid subscribers list) when
  their subscription is canceled (user.subscription.status.canceled). Uses the
  cm/subscriber-unsubscribe recipe.

  The canceled event carries only the subscription id, so the subscriber is resolved
  via subscription.get. Requires the CM_API_KEY secret and a list_id input.

  NOTE: the unsubscribe step is continue-on-error because Campaign Monitor returns a
  400 ("Subscriber not in list or has already been removed") when the user isn't on
  the list — a harmless no-op that shouldn't fail the run.
category: campaign-monitor
replaces:
  event_type: user.subscription.status.canceled
  channel: email
inputs:
  list_id:
    description: Campaign Monitor list ID to remove canceled subscribers from
    type: string
    required: true
    default: ""
definition:
  name: Subscription Canceled (Campaign Monitor)
  description: Unsubscribes canceled subscribers from a Campaign Monitor list.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-cancel-outline.svg
  version: 1

  on:
    - event:
        name: user.subscription.status.canceled
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.subscription.status.canceled@v1.0.0

  steps:
    - id: load-subscription
      action: subscription.get
      with:
        subscription_id: ${{ trigger.body.subscription }}

    - id: load-user
      action: user.get
      with:
        user_id: ${{ steps.load-subscription.outputs.subscription.user_id }}

    - id: remove-from-list
      includes: libatomic/passport-actions/recipes/cm/subscriber-unsubscribe
      continue-on-error: true
      with:
        api_key: ${{ secrets.CM_API_KEY }}
        list_id: ${{ inputs.list_id }}
        email: ${{ steps.load-user.outputs.user.profile.email }}
