name: New Subscriber (Campaign Monitor)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-star-outline.svg
description: |
  Adds a user to a Campaign Monitor list when their subscription becomes ACTIVE
  (user.subscription.status.active — i.e. payment succeeded). Only fires for
  subscriptions that have a plan and a price — free/planless subscriptions are skipped.
  Tags the subscriber with instance, user, subscription and plan ids plus the interval
  and end date. Uses the cm/subscriber-add recipe.

  NOTE: this triggers on status.active rather than user.subscription.created on purpose.
  At subscription.created the subscription is still incomplete and its period dates
  (begins_at/ends_at) haven't been set yet — Stripe backfills them a moment later when
  it confirms the subscription, which surfaces as status.active. Triggering here
  guarantees EndsAt/EndsAtPretty are populated. If you also want trial signups, add a
  second trigger on user.subscription.status.trialing (which likewise carries the dates).

  Requires the CM_API_KEY secret and a list_id input.
category: campaign-monitor
inputs:
  list_id:
    description: Campaign Monitor list ID to add paid subscribers to
    type: string
    required: true
    default: ""
definition:
  name: New Subscriber (Campaign Monitor)
  description: Adds paid, plan-backed subscribers to a Campaign Monitor list once active.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-star-outline.svg
  version: 1

  on:
    - event:
        name: user.subscription.status.active
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.subscription.status.active@v1.0.0

  steps:
    # Load the full subscription so we have the plan id, interval and end date, and
    # can confirm this is a paid, plan-backed subscription. Subscription events carry
    # the id as trigger.body.subscription_id. The `outputs:` block names that condition
    # once so later steps can reuse it as ${{ outputs.is_subscriber }}.
    - id: load-subscription
      action: subscription.get
      with:
        subscription_id: ${{ trigger.body.subscription_id }}
      outputs:
        is_subscriber: ${{ !empty(steps.load-subscription.outputs.subscription.plan_id) && !empty(steps.load-subscription.outputs.subscription.price_id) }}

    - id: load-user
      if: ${{ outputs.is_subscriber }}
      action: user.get
      with:
        user_id: ${{ steps.load-subscription.outputs.subscription.user_id }}

    - id: add-to-list
      if: ${{ outputs.is_subscriber }}
      includes: libatomic/passport-actions/recipes/cm/subscriber-add
      with:
        api_key: ${{ secrets.CM_API_KEY }}
        list_id: ${{ inputs.list_id }}
        email: ${{ steps.load-user.outputs.user.profile.email }}
        name: ${{ steps.load-user.outputs.user.profile.name }}
        custom_fields:
          - Key: InstanceName
            Value: ${{ instance.name }}
          - Key: PassportUserID
            Value: ${{ steps.load-subscription.outputs.subscription.user_id }}
          - Key: PassportSubscriptionID
            Value: ${{ steps.load-subscription.outputs.subscription.id }}
          - Key: PassportPlanID
            Value: ${{ steps.load-subscription.outputs.subscription.plan_id }}
          - Key: SubscriptionInterval
            Value: ${{ steps.load-subscription.outputs.subscription.recurring_interval }}
          - Key: EndsAt
            Value: ${{ steps.load-subscription.outputs.subscription.ends_at }}
          - Key: EndsAtPretty
            Value: ${{ fromNow(steps.load-subscription.outputs.subscription.ends_at) }}
