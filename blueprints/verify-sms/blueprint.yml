name: SMS Verification
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/cellphone-check.svg
description: |
  Sends a verification code via SMS when a user signs up or requests phone verification. Loads the user profile to retrieve their phone number and sends the code using the configured SMS template.
category: authentication
replaces:
  event_type: user.sms.verify
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: verify-sms
definition:
  name: SMS Verification
  description: Sends a verification code via SMS when a user signs up or requests phone verification. Loads the user profile to retrieve their phone number and sends the code using the configured SMS template.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/cellphone-check.svg
  version: 1

  on:
    - event: user.sms.verify

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
