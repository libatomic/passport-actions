name: Passwordless Login (SMS)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/message-lock-outline.svg
description: |
  Sends a one-time password via SMS for passwordless authentication. Triggered when a user requests passwordless login, this workflow loads their profile and delivers the code to their phone number.
category: authentication
replaces:
  event_type: user.password.sms
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: password-sms
definition:
  name: Passwordless Login (SMS)
  description: Sends a one-time password via SMS for passwordless authentication. Triggered when a user requests passwordless login, this workflow loads their profile and delivers the code to their phone number.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/message-lock-outline.svg
  version: 1

  on:
    - event:
        name: user.password.sms
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.password.sms@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
