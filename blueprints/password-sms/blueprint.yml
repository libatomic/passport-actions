name: password-sms
description: |
  Send a one-time password via SMS for passwordless login.
  Replaces the template trigger for event: user.password.sms
category: authentication
replaces:
  event_type: user.password.sms
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: password-sms
definition:
  name: password-sms
  version: 1

  on:
    - event: user.password.sms

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
