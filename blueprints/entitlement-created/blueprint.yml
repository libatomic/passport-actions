name: Subscription Confirmation
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-check-outline.svg
description: |
  Sends a confirmation email when a new subscription or entitlement is created for a user. Includes subscription details and serves as a receipt for the purchase.
category: billing
replaces:
  event_type: user.entitlement.created
  channel: email
inputs:
  template:
    description: The entitlement confirmation email template
    default: entitlement-created
definition:
  name: Subscription Confirmation
  description: Sends a confirmation email when a new subscription or entitlement is created for a user. Includes subscription details and serves as a receipt for the purchase.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-check-outline.svg
  version: 1

  on:
    - event:
        name: user.entitlement.created
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.entitlement.created@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-confirmation
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          entitlement: ${{ trigger.body }}
