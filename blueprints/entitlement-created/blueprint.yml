name: Entitlement Created
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/ticket-confirmation-outline.svg
description: |
  Sends a confirmation email when a new entitlement is granted to a user — a gift, comp, team seat, or any non-subscription grant. Entitlement events are related to but distinct from subscription events.
category: billing
replaces:
  event_type: user.entitlement.created
  channel: email
inputs:
  template:
    description: The entitlement confirmation email template
    default: entitlement-created
definition:
  name: Entitlement Created
  description: Sends a confirmation email when a new entitlement is granted to a user (gift, comp, team seat, or any non-subscription grant).
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/ticket-confirmation-outline.svg
  version: 1

  on:
    - event:
        name: user.entitlement.created
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.entitlement.created@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-confirmation
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          entitlement: ${{ trigger.body }}
