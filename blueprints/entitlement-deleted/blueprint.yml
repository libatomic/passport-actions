name: Entitlement Deleted
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/ticket-outline.svg
description: |
  Sends a notification email when a user's entitlement is removed — a gift expiring, a comp ending, or a team seat being revoked. Entitlement events are related to but distinct from subscription events.
category: billing
replaces:
  event_type: user.entitlement.deleted
  channel: email
inputs:
  template:
    description: The entitlement removed email template
    default: entitlement-deleted
definition:
  name: Entitlement Deleted
  description: Sends a notification email when a user's entitlement is removed (gift expiring, comp ending, or team seat revoked).
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/ticket-outline.svg
  version: 1

  on:
    - event:
        name: user.entitlement.deleted
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.entitlement.deleted@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-notification
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          entitlement: ${{ trigger.body }}
