name: Team Invitation
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-group-outline.svg
description: |
  Sends an invitation email when a user is added to a team. Notifies the invited user with team details and any relevant onboarding information.
category: engagement
replaces:
  event_type: team.member.added
  channel: email
inputs:
  template:
    description: The team invite email template
    default: team-invite
definition:
  name: Team Invitation
  description: Sends an invitation email when a user is added to a team. Notifies the invited user with team details and any relevant onboarding information.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/account-group-outline.svg
  version: 1

  on:
    - event: team.member.added

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-invite
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          team: ${{ trigger.body }}
