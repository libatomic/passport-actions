name: Password Reset (SMS)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/lock-reset.svg
description: |
  Sends a password reset code via SMS when a user requests to change their password. Loads the user profile to retrieve their phone number and delivers the reset code.
category: authentication
replaces:
  event_type: user.password.reset.sms
  channel: sms
inputs:
  template:
    description: The SMS template name
    default: password-reset-sms
definition:
  name: Password Reset (SMS)
  description: Sends a password reset code via SMS when a user requests to change their password. Loads the user profile to retrieve their phone number and delivers the reset code.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/lock-reset.svg
  version: 1

  on:
    - event:
        name: user.password.reset.sms
        schema:
          ref: libatomic/passport-actions/schemas/atomic/user.password.reset.sms@v1.0.0

  steps:
    - id: load-user
      action: user.get
      with:
        id: ${{ trigger.user_id }}

    - id: send-code
      action: sendsms
      with:
        to: ${{ steps.load-user.outputs.user.profile.phone_number }}
        template: ${{ inputs.template }}
        data:
          code: ${{ trigger.body.code }}
