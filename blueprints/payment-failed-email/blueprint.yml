name: Payment Failed Email
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
description: |
  Emails a customer when a charge fails. Fires on the Stripe charge.failed webhook
  event, loads the associated user, and sends the payment-failed template so they can
  update their payment method.
category: billing
replaces:
  event_type: charge.failed
  channel: email
inputs:
  template:
    description: The payment-failed email template
    default: payment-failed-email
definition:
  name: Payment Failed Email
  description: Emails a customer when a Stripe charge fails.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/credit-card-off-outline.svg
  version: 1

  on:
    - event:
        name: charge.failed
        schema:
          ref: libatomic/passport-actions/schemas/stripe/charge.failed@v1.0.0
      source: stripe

  steps:
    - id: load-user
      action: user.get
      with:
        user_id: ${{ trigger.user_id }}

    - id: send-failed
      action: sendmail
      with:
        to: ${{ steps.load-user.outputs.user.profile.email }}
        template: ${{ inputs.template }}
        data:
          user: ${{ steps.load-user.outputs.user }}
          charge: ${{ trigger.body }}
