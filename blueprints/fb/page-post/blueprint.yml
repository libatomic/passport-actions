name: Facebook Page Post (Distribution)
icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/facebook.svg
description: |
  Defines a custom "facebook" distribution channel. Once saved, "facebook" appears in an
  article's Add Distribution menu; publishing to it runs this workflow, which loads the
  distribution and posts its body to a Facebook Page feed via the fb/page-post recipe.

  Facebook Page posts are UTF-8 plain text — the channel is declared content_type: text,
  so the distribution editor collects (and the API enforces) plain text with no length
  cap. This is a broadcast channel (published once, no audience). Requires a
  WorkflowSecret FACEBOOK_PAGE_TOKEN (a Page access token) and a page_id input, and
  graph.facebook.com must be on the instance's http allowlist.
category: content
inputs:
  page_id:
    description: Facebook Page id to post to
    type: string
    required: true
    default: ""
definition:
  name: Facebook Page Post (Distribution)
  description: Publishes a distribution to a Facebook Page via the graph API.
  icon: https://cdn.jsdelivr.net/npm/@mdi/svg@7.4.47/svg/facebook.svg
  version: 1

  on:
    - distribution:
        channel: facebook
        label: Facebook
        mode: broadcast
        content_type: text

  inputs:
    page_id:
      description: Facebook Page id to post to
      type: string
      required: true
      default: ""

  steps:
    - id: load
      action: distribution.get
      with:
        distribution_id: ${{ trigger.distribution_id }}

    - id: post
      includes: libatomic/passport-actions/recipes/fb/page-post@v1
      with:
        page_id: ${{ inputs.page_id }}
        message: ${{ steps.load.outputs.distribution.body }}
        access_token: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
