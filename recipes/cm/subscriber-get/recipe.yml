name: cm-subscriber-get
description: Get a subscriber's details from a Campaign Monitor list

inputs:
  api_key:
    secret: true
    required: true
    type: string
    label: API Key
    description: Campaign Monitor API key (or use secrets.CM_API_KEY)
  list_id:
    required: true
    type: string
    label: List ID
    description: Campaign Monitor list ID
  email:
    required: true
    type: string
    label: Email Address
    description: Subscriber email address to look up

steps:
  - id: get
    action: http.get
    with:
      url: "https://api.createsend.com/api/v3.3/subscribers/${{ inputs.list_id }}.json"
      query:
        email: ${{ inputs.email }}
      headers:
        Authorization: "Basic ${{ base64Encode(inputs.api_key + ':x') }}"
        Accept: application/json
      expect_status: [200]
