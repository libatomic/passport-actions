name: cm-subscriber-add
description: Add a subscriber to a Campaign Monitor list

inputs:
  api_key:
    secret: true
    required: true
    type: string
    label: API Key
    description: Campaign Monitor API key (or use secrets.CM_API_KEY)
  list_id:
    required: true
    type: string
    label: List ID
    description: Campaign Monitor list ID
  email:
    required: true
    type: string
    label: Email Address
  name:
    default: ""
    type: string
    label: Name
    description: Subscriber display name
  custom_fields:
    default: []
    type: list
    label: Custom Fields
    description: >
      Campaign Monitor custom fields as an array of {Key, Value} objects,
      e.g. [{Key: "PassportUserID", Value: "..."}]. Empty by default.
    items:
      - { name: Key, label: Field }
      - { name: Value, label: Value }
  resubscribe:
    default: "true"
    type: bool
    label: Resubscribe
    description: Whether to resubscribe if already unsubscribed
  consent_to_track:
    default: "yes"
    type: string
    label: Consent to Track
    enum:
      - "yes"
      - "no"
      - "unchanged"

steps:
  - id: add
    action: http.post
    with:
      url: "https://api.createsend.com/api/v3.3/subscribers/${{ inputs.list_id }}.json"
      headers:
        Authorization: "Basic ${{ base64Encode(inputs.api_key + ':x') }}"
        Content-Type: application/json
      body:
        EmailAddress: ${{ inputs.email }}
        Name: ${{ inputs.name }}
        CustomFields: ${{ inputs.custom_fields }}
        Resubscribe: ${{ inputs.resubscribe == "true" }}
        ConsentToTrack: ${{ inputs.consent_to_track }}
      expect_status: [200, 201]
