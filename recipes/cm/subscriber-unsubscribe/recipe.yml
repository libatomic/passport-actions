name: cm-subscriber-unsubscribe
description: Unsubscribe a subscriber from a Campaign Monitor list

inputs:
  api_key:
    required: true
    type: string
    label: API Key
    description: Campaign Monitor API key (or use secrets.CM_API_KEY)
  list_id:
    required: true
    type: string
    label: List ID
    description: Campaign Monitor list ID
  email:
    required: true
    type: string
    label: Email Address
    description: Subscriber email address to unsubscribe

steps:
  - id: unsubscribe
    action: http.post
    with:
      url: "https://api.createsend.com/api/v3.3/subscribers/${{ inputs.list_id }}/unsubscribe.json"
      headers:
        Authorization: "Basic ${{ base64Encode(inputs.api_key + ':x') }}"
        Content-Type: application/json
      body:
        EmailAddress: ${{ inputs.email }}
      expect_status: [200]
