name: stripe-customer-get
version: "1.0"
description: Retrieve a Stripe customer by ID

inputs:
  api_key:
    secret: true
    required: true
    type: string
    label: API Key
    description: Stripe secret API key (or use secrets.STRIPE_SECRET_KEY)
  customer_id:
    required: true
    type: string
    label: Customer ID
    description: Stripe customer ID (cus_xxx)
  expand:
    default: ""
    type: string
    label: Expand
    description: Comma-separated list of fields to expand

steps:
  - id: get
    action: http.get
    with:
      url: "https://api.stripe.com/v1/customers/${{ inputs.customer_id }}"
      query: '${{ inputs.expand != "" ? { "expand[]": inputs.expand } : {} }}'
      headers:
        Authorization: "Bearer ${{ inputs.api_key }}"
        Accept: application/json
      expect_status: [200]
