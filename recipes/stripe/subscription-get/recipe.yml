name: stripe-subscription-get
description: Retrieve a Stripe subscription by ID

inputs:
  api_key:
    required: true
    type: string
    label: API Key
    description: Stripe secret API key (or use secrets.STRIPE_SECRET_KEY)
  subscription_id:
    required: true
    type: string
    label: Subscription ID
    description: Stripe subscription ID (sub_xxx)
  expand:
    default: ""
    type: string
    label: Expand
    description: Comma-separated list of fields to expand

steps:
  - id: get
    action: http.get
    with:
      url: "https://api.stripe.com/v1/subscriptions/${{ inputs.subscription_id }}"
      query: ${{ inputs.expand != "" ? { "expand[]": inputs.expand } : {} }}
      headers:
        Authorization: "Bearer ${{ inputs.api_key }}"
        Accept: application/json
      expect_status: [200]
