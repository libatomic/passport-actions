name: stripe-customer-update
description: Update a Stripe customer

inputs:
  api_key:
    secret: true
    required: true
    type: string
    label: API Key
    description: Stripe secret API key (or use secrets.STRIPE_SECRET_KEY)
  customer_id:
    required: true
    type: string
    label: Customer ID
    description: Stripe customer ID (cus_xxx)
  email:
    default: ""
    type: string
    label: Email Address
    description: Updated email address for the customer
  name:
    default: ""
    type: string
    label: Name
    description: Updated customer name
  description:
    default: ""
    type: string
    label: Description
    description: Updated description for the customer
  metadata:
    default: ""
    type: object
    label: Metadata
    description: Key-value pairs to store on the customer

steps:
  - id: update
    action: http.post
    with:
      url: "https://api.stripe.com/v1/customers/${{ inputs.customer_id }}"
      headers:
        Authorization: "Bearer ${{ inputs.api_key }}"
        Content-Type: application/x-www-form-urlencoded
        Accept: application/json
      body:
        email: ${{ inputs.email }}
        name: ${{ inputs.name }}
        description: ${{ inputs.description }}
      expect_status: [200]
